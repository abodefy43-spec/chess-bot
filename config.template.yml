token: "__LICHESS_BOT_TOKEN__"
url: "https://lichess.org/"

engine:
  dir: "__ENGINE_DIR__"
  name: "ripper"
  protocol: "uci"
  ponder: true

  polyglot:
    enabled: false

  draw_or_resign:
    resign_enabled: true
    resign_score: -900
    resign_moves: 4
    offer_draw_enabled: true
    offer_draw_score: 0
    offer_draw_moves: 10
    offer_draw_pieces: 8

  online_moves:
    max_out_of_book_moves: 10
    max_retries: 2
    chessdb_book:
      enabled: false
    lichess_cloud_analysis:
      enabled: false
    lichess_opening_explorer:
      enabled: false
    online_egtb:
      enabled: false

  lichess_bot_tbs:
    syzygy:
      enabled: false
    gaviota:
      enabled: false

  engine_options:

  uci_options:
    Hash: 256
    Threads: 4
    OwnBook: true
    UseNNUE: false

  homemade_options:

  silence_stderr: false

abort_time: 20
fake_think_time: false
rate_limiting_delay: 0
move_overhead: 200
quit_on_site_down: true

correspondence:
  move_time: 60
  checkin_period: 600
  disconnect_time: 300
  ponder: false

challenge:
  concurrency: 2
  sort_by: "best"
  preference: "none"
  accept_bot: true
  only_bot: false
  max_increment: 180
  min_increment: 0
  max_base: 3600
  min_base: 60
  max_days: 14
  min_days: 1
  variants:
    - standard
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  modes:
    - casual
    - rated
  block_list:
  online_block_list:
  recent_bot_challenge_age: 60
  max_recent_bot_challenges: 2

greeting:
  hello: "Hi! I'm Ripper — a home-grown UCI engine. GL HF!"
  goodbye: "GG!"
  hello_spectators: "Ripper playing."
  goodbye_spectators: ""

pgn_directory: "__PGN_DIR__"
pgn_file_grouping: "game"

matchmaking:
  allow_matchmaking: false
